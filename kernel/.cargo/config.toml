[build]
target = "x86_64-unknown-none"

[target.x86_64-unknown-none]
rustflags = [
    "-C", "relocation-model=static",
    "-C", "link-arg=-TC:/Users/adiya/OneDrive/Documents/HepOS/kernel/linker.ld",
    "-C", "link-arg=-z",
    "-C", "link-arg=max-page-size=0x1000",
    "-C", "link-arg=--no-rosegment",
